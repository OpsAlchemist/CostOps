version: "3.9"

services:
  # Uncomment postgres for local development without RDS
  # postgres:
  #   image: postgres:15
  #   environment:
  #     POSTGRES_DB: cost_calculator
  #     POSTGRES_USER: user
  #     POSTGRES_PASSWORD: pass
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U user -d cost_calculator"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - FERNET_KEY=${FERNET_KEY}
      - PRICING_SOURCE=${PRICING_SOURCE:-ai}

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_ADMIN=true
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

