name: CI - Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ==========================================
  #  Backend CI
  # ==========================================
  backend:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: cost_calculator_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d cost_calculator_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cost_calculator_test
          DB_USER: user
          DB_PASSWORD: pass
          JWT_SECRET: test-secret-key-for-ci-only
          FERNET_KEY: ${{ secrets.FERNET_KEY }}
          AI_PROVIDER: gemini
          PRICING_SOURCE: ai
        run: python -m pytest -v --tb=short

  # ==========================================
  #  Frontend CI
  # ==========================================
  frontend:
    name: Frontend - Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run lint

      - name: Run tests
        working-directory: frontend
        run: npx vitest --run

      - name: Build
        working-directory: frontend
        run: npm run build

  # ==========================================
  #  Docker Build Validation
  # ==========================================
  docker:
    name: Docker - Build Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: docker build -t costops-backend ./backend

      - name: Build Frontend Image
        run: docker build -t costops-frontend ./frontend

      - name: Backend Smoke Test
        run: |
          docker run -d --name backend-smoke -p 8000:8000 \
            -e DB_HOST=host.docker.internal \
            -e JWT_SECRET=smoke-test-secret \
            -e FERNET_KEY=dGVzdC1mZXJuZXQta2V5LWZvci1zbW9rZS10ZXN0cw== \
            costops-backend || true
          sleep 3
          docker logs backend-smoke || true
