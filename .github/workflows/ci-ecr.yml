name: CI/CD - Docker Build & Push
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ==========================================
  #  CI JOB (Runs on ALL branches)
  # ==========================================
  build-test:
    name: Build & Validate Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Backend (Test)
        run: |
          docker build -t backend-test ./backend
          
      - name: Build Frontend (Test)
        run: |
          docker build -t frontend-test ./frontend
          
      - name: Run Backend Container (Smoke Test)
        run: |
          docker run -d -p 8000:8000 backend-test
          sleep 5
          curl -f http://localhost:8000/docs || exit 1

  # ==========================================
  #  CD JOB (Only on MAIN)
  # ==========================================
  push-to-ecr:
    name: Push Images to ECR
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    environment: CostOps CI 
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}  
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }} 
      IMAGE_TAG: ${{ github.sha }}
      BACKEND_REPO: costops-backend
      FRONTEND_REPO: costops-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }} 

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ env.IMAGE_TAG }}" >> $GITHUB_ENV

      # -----------------------------
      #  Backend
      # -----------------------------
      - name: Build Backend Image
        run: |
          docker build \
            -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/costops/$BACKEND_REPO:latest \
            -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/costops/$BACKEND_REPO:$IMAGE_TAG \
            ./backend

      - name: Push Backend Image
        run: |
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/costops/$BACKEND_REPO:latest
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/costops/$BACKEND_REPO:$IMAGE_TAG

      # -----------------------------
      #  Frontend
      # -----------------------------
      - name: Build Frontend Image
        run: |
          docker build \
            -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/costops/$FRONTEND_REPO:latest \
            -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/costops/$FRONTEND_REPO:$IMAGE_TAG \
            ./frontend

      - name: Push Frontend Image
        run: |
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/costops/$FRONTEND_REPO:latest
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/costops/$FRONTEND_REPO:$IMAGE_TAG

  # ==========================================
  #  DEPLOY JOB - Terraform (Only on MAIN)
  # ==========================================
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: push-to-ecr
    if: github.ref == 'refs/heads/main'
    environment: CostOps CI
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: cloud
        run: terraform init

      - name: Terraform Apply
        working-directory: cloud
        run: terraform apply -auto-approve
