name: CI - Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ==========================================
  #  Backend CI
  # ==========================================
  backend:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: cost_calculator_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d cost_calculator_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cost_calculator_test
          DB_USER: user
          DB_PASSWORD: pass
          DB_USE_IAM_AUTH: "false"
          JWT_SECRET: test-secret-key-for-ci-only
          FERNET_KEY: ${{ secrets.FERNET_KEY }}
          ENABLE_CLOUDWATCH: "false"
          AI_PROVIDER: gemini
          PRICING_SOURCE: ai
        run: python -m pytest -v --tb=short

  # ==========================================
  #  Frontend CI
  # ==========================================
  frontend:
    name: Frontend - Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run lint

      - name: Run tests
        working-directory: frontend
        run: npx vitest --run

      - name: Build
        working-directory: frontend
        run: npm run build

  # ==========================================
  #  Docker Build Validation
  # ==========================================
  docker:
    name: Docker - Build Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: docker build -t costops-backend ./backend

      - name: Build Frontend Image
        run: docker build -t costops-frontend ./frontend

      - name: Backend Smoke Test
        run: |
          docker run -d --name backend-smoke -p 8000:8000 \
            -e DB_HOST=host.docker.internal \
            -e JWT_SECRET=smoke-test-secret \
            -e FERNET_KEY=dGVzdC1mZXJuZXQta2V5LWZvci1zbW9rZS10ZXN0cw== \
            costops-backend || true
          sleep 3
          docker logs backend-smoke || true

  # ==========================================
  #  Create Incident on Failure
  # ==========================================
  create-incident:
    name: Create Incident Ticket
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: failure()

    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const failedJobs = [];
            const jobs = ['backend', 'frontend', 'docker'];

            for (const job of jobs) {
              const need = context.payload?.workflow_run?.conclusion || 'unknown';
              failedJobs.push(job);
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const branch = context.ref.replace('refs/heads/', '');
            const sha = context.sha.substring(0, 7);
            const actor = context.actor;
            const timestamp = new Date().toISOString();

            const title = `CI Failed: ${branch} — ${sha}`;
            const body = [
              `## CI Pipeline Failure`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| **Branch** | \`${branch}\` |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Triggered by** | @${actor} |`,
              `| **Time** | ${timestamp} |`,
              `| **Run** | [View Details](${runUrl}) |`,
              ``,
              `### Action Required`,
              `Review the failed pipeline run and fix the issues.`,
              ``,
              `---`,
              `*Auto-generated by CI pipeline*`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['incident', 'ci-failure'],
            });
