name: Notify Docs

# Drop this file into .github/workflows/docs-update.yml inside the CostOps and
# OtakuVerse repositories. It pings the docs repo so the site rebuilds on every
# push to main.

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-update.yml'
  workflow_dispatch:

jobs:
  trigger-docs-build:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch update-docs event
        uses: actions/github-script@v7
        with:
          # DOCS_DISPATCH_TOKEN must be a PAT (or fine-grained token) with
          # `contents: write` on the docs repo.
          github-token: ${{ secrets.DOCS_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: 'CodeDocs',
              event_type: 'update-docs',
              client_payload: {
                source_repo: context.repo.repo,
                sha: context.sha,
                ref: context.ref,
              },
            });
